<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琅玕资讯智能体 - Agentic UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="particle-bg"></div>

    <div class="app-container">
        <!-- Minimal Sidebar for Status / History -->
        <aside class="aui-sidebar glass-panel">
            <div class="brand">
                <img src="logo_ts.png" alt="琅玕 Logo" class="logo">
                <div style="flex:1">
                    <h2 style="font-size: 1.1rem; margin-bottom:0;">琅玕资讯智能体</h2>
                    <span class="version" style="color:var(--text-secondary); font-size: 0.8rem;">AUI v2.0.0-beta</span>
                </div>
            </div>

            <div class="agent-status-panel">
                <h3 style="font-size: 0.9rem; color:var(--accent-jade); margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 5px;">
                    <i class="fa-solid fa-server"></i> 节点心跳记录
                </h3>
                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span style="font-size:0.85rem">全网情报雷达：在线警戒</span>
                </div>
                <div class="status-indicator">
                    <span class="pulse-dot" style="background:var(--accent-gold); box-shadow:0 0 10px var(--accent-gold);"></span>
                    <span style="font-size:0.85rem">vLLM 推理引擎：低功耗冷备</span>
                </div>
            </div>

            <nav class="aui-prompts">
                <h3 style="font-size: 0.9rem; color:var(--text-secondary); margin-bottom: 15px;">
                    <i class="fa-solid fa-bolt"></i> 快捷意图注入
                </h3>
                <button class="prompt-btn" onclick="sendPrompt('提取并总结今日份深度 AI 资讯简报')">提取今日深度简报</button>
                <button class="prompt-btn" onclick="sendPrompt('启动全网雷达，扫描最新高价值前沿论文')">雷达：扫描前沿论文</button>
                <button class="prompt-btn" onclick="sendPrompt('帮我出一份 270 万大模型本地私有化部署标案报价方案')">生成：私有化落地标案</button>
            </nav>
            
            <nav class="aui-prompts" style="margin-top: 30px;">
                <h3 style="font-size: 0.9rem; color:var(--text-secondary); margin-bottom: 15px;">
                    <i class="fa-solid fa-book-journal-whills"></i> 琅玕典藏库直达
                </h3>
                <button class="prompt-btn" onclick="openArticle('archive-github')" style="border-left: 3px solid var(--accent-jade);">琅玕玉册 <span style="color:gray;font-size:0.8em;float:right;">[开源趋势]</span></button>
                <button class="prompt-btn" onclick="openArticle('archive-ai-fund')" style="border-left: 3px solid var(--accent-gold);">珠树集 <span style="color:gray;font-size:0.8em;float:right;">[投融资]</span></button>
                <button class="prompt-btn" onclick="openArticle('archive-gpt-5')" style="border-left: 3px solid #00ff9d;">丹木录 <span style="color:gray;font-size:0.8em;float:right;">[核心架构]</span></button>
                <button class="prompt-btn" onclick="openArticle('archive-sora-v2')" style="border-left: 3px solid var(--accent-blue);">文玉谱 <span style="color:gray;font-size:0.8em;float:right;">[模型评估]</span></button>
            </nav>

            <div style="margin-top: auto; display: flex; flex-direction: column; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <button onclick="openAPISettings()" style="background: rgba(255, 0, 60, 0.1); border: 1px dashed var(--accent-jade); color: var(--accent-jade); padding: 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s;" onmouseover="this.style.background='rgba(255, 0, 60, 0.2)'" onmouseout="this.style.background='rgba(255, 0, 60, 0.1)'">
                    <i class="fa-solid fa-microchip"></i> 算力引擎池接入 (API Keys)
                </button>
                <div style="text-align: center; color: var(--text-muted); font-size: 0.75rem; line-height: 1.6; letter-spacing: 1px;">
                    神 思 庭 · AI 山 海 造 物 主<br>
                    &copy; 2026 SHENSIST.TOP<br>
                    ACCESSING THE FUTURE
                </div>
            </div>
        </aside>

        <main class="aui-main">
            <header class="aui-header glass-panel">
                <div class="header-title" style="display:flex; align-items:center; gap: 10px;">
                    <button class="btn-icon hamburger-btn" onclick="toggleSidebar()" style="display: none; cursor: pointer; margin-right: 10px;">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <span class="pulse-dot" style="position:static; width:6px; height:6px;"></span>
                    <span style="font-weight: 600; letter-spacing: 2px;">琅玕 AUI 隐秘指挥舱</span>
                </div>
                <button class="btn-icon" onclick="openNotificationModal()" style="cursor: pointer; position: relative;">
                    <i class="fa-regular fa-bell"></i>
                    <span style="position: absolute; top: -5px; right: -5px; background: var(--accent-jade); color: #000; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: bold;">3</span>
                </button>
            </header>

            <div class="chat-stream" id="chat-stream">
                <!-- Initial Agent Message -->
                <div class="message agent">
                    <div class="avatar"><img src="logo_ts.png" alt="Langgan"></div>
                    <div class="msg-content glass-panel" style="border-left: 3px solid var(--accent-jade);">
                        <p style="font-weight:bold; color:var(--accent-jade); margin-bottom: 8px;">琅玕系统已上线。</p>
                        <p>全网感知触手已就绪。所有后台 API 响应均已打通，可直接执行原生请求。</p>
                        <p style="margin-top: 10px; color:var(--text-secondary); font-size: 0.9em;">
                            > 请在下方命令台输入自然语言指令（例如：“帮我搜寻今日融资”），<br>
                            > 或是点击左侧「快捷意图」自动注入指令。
                        </p>
                    </div>
                </div>
            </div>

            <div class="input-area glass-panel">
                <div class="input-wrapper">
                    <input type="text" id="aui-input" placeholder="键入指令... [例如：启动多模态搜索 / 分析采购网最新订单]" autocomplete="off">
                    <button class="send-btn" id="send-btn" onclick="handleInput()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Global Glassmorphism Modal (Keep untouched for article/proposal pops) -->
    <div id="global-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); z-index: 1000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;">
        <div class="modal-content glass-panel" style="width: 80%; max-width: 900px; max-height: 85vh; overflow-y: auto; padding: 40px; position: relative; border: 1px solid var(--accent-jade); box-shadow: 0 0 40px rgba(255, 0, 60, 0.2);">
            <button class="modal-close" onclick="closeModal()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; transition: color 0.2s;"><i class="fa-solid fa-xmark"></i></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
